    function madFormula(args) { var isNotNull = function(value) { return (value != null && value != undefined); }; var applyRounding = function(value, roundingStrategy, applicableMadProgram) { if (isNotNull(applicableMadProgram) && isNotNull(applicableMadProgram.flags) && applicableMadProgram.flags.roundUpPrecision === 'PENNY') { if (!isNotNull(roundingStrategy) || roundingStrategy == 'NEAR') { return Math.round(value); } else if (roundingStrategy == 'ROUNDUP') { return Math.ceil(value); } else if (roundingStrategy == 'ROUNDDOWN') { return Math.floor(value); } else { return Math.round(value); } } else { var valueInDollars = value / 100; if (!isNotNull(roundingStrategy) || roundingStrategy == 'NEAR') { return Math.round(valueInDollars) * 100; } else if (roundingStrategy == 'ROUNDUP') { return Math.ceil(valueInDollars) * 100; } else if (roundingStrategy == 'ROUNDDOWN') { return Math.floor(valueInDollars) * 100; } else { return Math.round(valueInDollars) * 100; } } }; var getModelParam = function(paramName) { if (isNotNull(args.modelparameters)) { var modelParam = args.modelparameters[paramName]; return isNotNull(modelParam) ? modelParam : null; } else { return null; } }; var getMinimumCurrMADDefault = function() { var currDueThreshold = getModelParam('currentDueThreshold'); return isNotNull(currDueThreshold) ? currDueThreshold : 3500; }; var getMinimumCurrMAD = function(applicableMadProgram) { if (isNotNull(applicableMadProgram) && isNotNull(applicableMadProgram.flags) && isNotNull(applicableMadProgram.flags.minimumCurrentMADAmount)) { return applicableMadProgram.flags.minimumCurrentMADAmount; } else { var currDueThreshold = getModelParam('currentDueThreshold'); return isNotNull(currDueThreshold) ? currDueThreshold : 3500; } }; var getMinimumTotalMAD = function() { var totalMinDueThreshold = getModelParam('minimumAmountDueThreshold'); return isNotNull(totalMinDueThreshold) ? totalMinDueThreshold : 0; }; var getKeyDate = function(paramName) { var keyDate = args.customFields[paramName]; return isNotNull(keyDate) ? keyDate : null; }; var isAccountEligibleForFullAnnualFeeContributionInMAD = function(cutoffDateKey) { if (isNotNull(args.customFields) && getKeyDate(cutoffDateKey) != null && args.currentCBUStartTime >= getKeyDate(cutoffDateKey)) { return true; } return false; }; var defaultFlags = { minimumCurrentMADAmount: getMinimumCurrMADDefault(), roundUpPrecision: 'DOLLAR' }; var scraFlags = { minimumCurrentMADAmount: 1000, roundUpPrecision: 'PENNY' }; var defaultProgram = { precedence: 1, selectionCriteria: null, flags: defaultFlags }; var scraMadProgram = { precedence: 100, selectionCriteria: { tags: [{ type: 'SCRAStatus', value: 'LEVEL_1', }, ], }, flags: scraFlags }; var madPrograms = []; madPrograms.push(scraMadProgram, defaultProgram); madPrograms.sort(function(a, b) { return b.precedence - a.precedence; }); var getApplicableMadProgram = function() { if (!args.ledgerinfo) { return defaultProgram; } for (var i = 0; i < madPrograms.length; i++) { var program = madPrograms[i]; if (program.selectionCriteria == null) { return program; } for (var j = 0; j < program.selectionCriteria.tags.length; j++) { var programTag = program.selectionCriteria.tags[j]; for (var k = 0; k < args.ledgerinfo.tags.length; k++) { var ledgerTag = args.ledgerinfo.tags[k]; if (programTag.type === ledgerTag.type && programTag.value === ledgerTag.value && (ledgerTag.attributes['expiryDate'] == null || ledgerTag.attributes['expiryDate'] > args.billingdate)) { return program; } } } } return defaultProgram; }; var applicableMadProgram = getApplicableMadProgram(); var currMADFromCategories = 0.01 * args.postingcategories.cashinterestbilled + 0.01 * args.postingcategories.retailinterestbilled + 0.01 * args.postingcategories.cashadvancefeebilled + 0.01 * args.postingcategories.retailservicefeebilled + 0.01 * args.postingcategories.latefeebilled + 0.01 * args.postingcategories.annualfeebilled + 0.01 * args.postingcategories.retailmiscfeebilled + 0.01 * args.postingcategories.insufficientfundfeebilled + 0.01 * args.postingcategories.cashprincipalbilled + 0.01 * args.postingcategories.retailprincipalbilled + 1.01 * args.postingcategories.cashinterestunbilled + 1.01 * args.postingcategories.retailinterestunbilled + 1.01 * args.postingcategories.cashadvancefeeunbilled + 0.01 * args.postingcategories.retailservicefeeunbilled + 1.01 * args.postingcategories.latefeeunbilled + 0.01 * args.postingcategories.annualfeeunbilled + 0.01 * args.postingcategories.retailmiscfeeunbilled + 1.01 * args.postingcategories.insufficientfundfeeunbilled + 0.01 * args.postingcategories.cashprincipalunbilled + 0.01 * args.postingcategories.retailprincipalunbilled + 0.01 * args.postingcategories.accountsetupfeeunbilled + 0.01 * args.postingcategories.accountsetupfeebilled + 0.01 * args.postingcategories.collectionfeebilled + 0.01 * args.postingcategories.collectionfeeunbilled + 0; var previousminimumamountdue = 1 * (args.postingcategories.minimumamountdue); var dateForAnnualFeeConsiderationKey = isNotNull(getModelParam('keyDateForAnnualFeeConsideration')) ? getModelParam('keyDateForAnnualFeeConsideration') : 'FIRST_ANNIVERSARY_OF_ACCOUNT_OPEN_DATE'; var annualfeeunbilledExplicitContribution = isAccountEligibleForFullAnnualFeeContributionInMAD(dateForAnnualFeeConsiderationKey) ? 1 * args.postingcategories.annualfeeunbilled : 0; var minMAD = getMinimumCurrMAD(applicableMadProgram); var roundOffStrategyForCategoryContribution = isNotNull(getModelParam('roundingForCategoryContribution')) ? getModelParam('roundingForCategoryContribution') : 'ROUNDUP'; currMADFromCategories = applyRounding(currMADFromCategories, roundOffStrategyForCategoryContribution, applicableMadProgram); var currMADConsideringMinMAD = Math.max(currMADFromCategories, minMAD); var finalCurrMADWithoutRounding = currMADConsideringMinMAD + annualfeeunbilledExplicitContribution; if (args.currentbalance < 0) { finalCurrMADWithoutRounding = 0; } var finalCurrMAD = applyRounding(finalCurrMADWithoutRounding, getModelParam('roundingForCurrentDue'), applicableMadProgram); var totalMADWithoutRounding = finalCurrMAD + previousminimumamountdue; var totalMADWithRounding = applyRounding(totalMADWithoutRounding, getModelParam('roundingForMinimumAmountDue'), applicableMadProgram); var totalMAD = totalMADWithRounding; if (totalMADWithRounding > args.currentbalance) { totalMAD = Math.max(Math.min(totalMADWithoutRounding, args.currentbalance), 0); finalCurrMAD = Math.max(totalMAD - previousminimumamountdue, 0); } var finalTotalMAD = Math.max(Math.min(totalMAD, args.currentbalance), getMinimumTotalMAD()); finalTotalMAD = Math.max(finalTotalMAD, 0); var madComponents = {}; madComponents['cashinterestbilled'] = 0.01 * (args.postingcategories.cashinterestbilled); madComponents['retailinterestbilled'] = 0.01 * (args.postingcategories.retailinterestbilled); madComponents['cashadvancefeebilled'] = 0.01 * (args.postingcategories.cashadvancefeebilled); madComponents['retailservicefeebilled'] = 0.01 * (args.postingcategories.retailservicefeebilled); madComponents['latefeebilled'] = 0.01 * (args.postingcategories.latefeebilled); madComponents['annualfeebilled'] = 0.01 * (args.postingcategories.annualfeebilled); madComponents['retailmiscfeebilled'] = 0.01 * (args.postingcategories.retailmiscfeebilled); madComponents['insufficientfundfeebilled'] = 0.01 * (args.postingcategories.insufficientfundfeebilled); madComponents['cashprincipalbilled'] = 0.01 * (args.postingcategories.cashprincipalbilled); madComponents['retailprincipalbilled'] = 0.01 * (args.postingcategories.retailprincipalbilled); madComponents['cashinterestunbilled'] = 1.01 * (args.postingcategories.cashinterestunbilled); madComponents['retailinterestunbilled'] = 1.01 * (args.postingcategories.retailinterestunbilled); madComponents['cashadvancefeeunbilled'] = 1.01 * (args.postingcategories.cashadvancefeeunbilled); madComponents['retailservicefeeunbilled'] = 0.01 * (args.postingcategories.retailservicefeeunbilled); madComponents['latefeeunbilled'] = 1.01 * (args.postingcategories.latefeeunbilled); madComponents['annualfeeunbilled'] = 0.01 * (args.postingcategories.annualfeeunbilled) + annualfeeunbilledExplicitContribution; madComponents['retailmiscfeeunbilled'] = 0.01 * (args.postingcategories.retailmiscfeeunbilled); madComponents['insufficientfundfeeunbilled'] = 1.01 * (args.postingcategories.insufficientfundfeeunbilled); madComponents['cashprincipalunbilled'] = 0.01 * (args.postingcategories.cashprincipalunbilled); madComponents['retailprincipalunbilled'] = 0.01 * (args.postingcategories.retailprincipalunbilled); madComponents['accountsetupfeeunbilled'] = 0.01 * (args.postingcategories.accountsetupfeeunbilled); madComponents['accountsetupfeebilled'] = 0.01 * (args.postingcategories.accountsetupfeebilled); madComponents['collectionfeeunbilled'] = 0.01 * (args.postingcategories.collectionfeeunbilled); madComponents['collectionfeebilled'] = 0.01 * (args.postingcategories.collectionfeebilled); madComponents['minimumminimumamountdue'] = minMAD; madComponents['previousminimumamountdue'] = previousminimumamountdue; madComponents['currentminimumamountdue'] = finalCurrMAD; madComponents['totalminimumamountdue'] = finalTotalMAD; return JSON.stringify(madComponents); }
